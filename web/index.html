<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWAB</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #262626;
  --text: #e5e5e5;
  --text-dim: #737373;
  --text-bright: #fafafa;
  --accent: #3b82f6;
  --accent-dim: #1d4ed8;
  --user-bg: #1e3a5f;
  --tool-bg: #1a1a2e;
  --tool-border: #2a2a4a;
  --error: #ef4444;
  --success: #22c55e;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --radius: 8px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; }

#app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; color: var(--text-bright); letter-spacing: -0.3px; }
#status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-dim);
}
#status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim);
  transition: background 0.2s;
}
#status-dot.connected { background: var(--success); }
#status-dot.streaming { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ── Messages ── */
#messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}

.msg { display: flex; flex-direction: column; gap: 4px; max-width: 85%; }
.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; max-width: 90%; }
.msg.tool { align-self: flex-start; max-width: 90%; }
.msg.error { align-self: flex-start; max-width: 90%; }

.msg-user {
  background: var(--user-bg); color: var(--text-bright);
  padding: 10px 14px; border-radius: var(--radius) var(--radius) 2px var(--radius);
  white-space: pre-wrap; word-break: break-word;
}

.msg-assistant {
  padding: 10px 0; white-space: pre-wrap; word-break: break-word;
  line-height: 1.6;
}
.msg-assistant code {
  background: var(--surface); padding: 2px 5px; border-radius: 4px;
  font-family: var(--mono); font-size: 13px;
}
.msg-assistant pre {
  background: var(--surface); padding: 10px 14px; border-radius: var(--radius);
  overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 13px;
  border: 1px solid var(--border);
}

/* ── Tool cards ── */
.tool-card {
  background: var(--tool-bg); border: 1px solid var(--tool-border);
  border-radius: 4px; overflow: hidden; font-size: 11px;
}
.tool-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 8px; cursor: pointer; user-select: none;
}
.tool-header:hover { background: rgba(255,255,255,0.03); }
.tool-name { font-family: var(--mono); color: var(--accent); font-weight: 500; font-size: 11px; }
.tool-status { font-size: 10px; color: var(--text-dim); }
.tool-status.running { color: var(--accent); }
.tool-status.error { color: var(--error); }
.tool-toggle { color: var(--text-dim); font-size: 9px; transition: transform 0.2s; }
.tool-toggle.open { transform: rotate(90deg); }
.tool-args { display: none; }
.tool-body {
  border-top: 1px solid var(--tool-border);
  padding: 4px 8px; font-family: var(--mono); font-size: 11px;
  max-height: 120px; overflow: auto; white-space: pre-wrap; word-break: break-word;
  color: var(--text-dim); background: rgba(0,0,0,0.15);
  display: none;
}
.tool-body.open { display: block; }

/* ── Thinking ── */
.msg-thinking {
  padding: 2px 8px; font-size: 11px; color: var(--text-dim);
  font-style: italic; border-left: 2px solid var(--border); margin: 2px 0;
  cursor: pointer; user-select: none;
}
.msg-thinking:hover { color: var(--text); }
.thinking-content {
  max-height: 0; overflow: hidden; transition: max-height 0.3s;
}
.thinking-content.open { max-height: 300px; }

/* ── Error ── */
.msg-error-text {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  padding: 10px 14px; border-radius: var(--radius); color: var(--error);
  font-size: 13px;
}

/* ── System / status messages ── */
.msg-system {
  align-self: center; max-width: 80%; text-align: center;
  padding: 4px 12px; font-size: 11px; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px;
}
.msg-system .label { font-weight: 600; color: var(--text); margin-right: 4px; }

/* ── Queue indicator ── */
#queue-indicator {
  display: none; align-items: center; gap: 6px;
  padding: 4px 12px; font-size: 11px; color: var(--accent);
  background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2);
  border-radius: 12px; margin: 0 auto;
}
#queue-indicator.visible { display: inline-flex; }

/* ── Modal (extension UI dialogs) ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; min-width: 340px; max-width: 520px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.modal h3 { font-size: 15px; color: var(--text-bright); margin-bottom: 12px; }
.modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
.modal select {
  width: 100%; padding: 8px 12px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 14px; margin-bottom: 12px; outline: none;
}
.modal select:focus { border-color: var(--accent); }
.modal input[type="text"] {
  width: 100%; padding: 8px 12px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 14px; margin-bottom: 12px; outline: none;
}
.modal input[type="text"]:focus { border-color: var(--accent); }
.modal textarea {
  width: 100%; padding: 8px 12px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-family: var(--mono); font-size: 13px; min-height: 160px;
  resize: vertical; margin-bottom: 12px; outline: none;
}
.modal textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button { padding: 8px 16px; font-size: 13px; }
.modal-actions .cancel { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
.modal-actions .cancel:hover { background: var(--border); }

/* ── Settings list ── */
.settings-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; font-size: 13px; color: var(--text);
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { color: var(--text); }
.setting-row input[type="checkbox"] {
  appearance: none; width: 36px; height: 20px;
  background: var(--border); border-radius: 10px;
  position: relative; cursor: pointer; transition: background 0.2s;
}
.setting-row input[type="checkbox"]:checked { background: var(--accent); }
.setting-row input[type="checkbox"]::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: white; transition: transform 0.2s;
}
.setting-row input[type="checkbox"]:checked::after { transform: translateX(16px); }
.setting-select {
  padding: 4px 8px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
  cursor: pointer; outline: none;
}
.setting-select:focus { border-color: var(--accent); }

/* ── Input ── */
#input-area {
  flex-shrink: 0; padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
}
#input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px; color: var(--text);
  font-family: var(--sans); font-size: 14px; resize: none; outline: none;
  min-height: 42px; max-height: 200px; line-height: 1.5;
}
#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text-dim); }

button {
  background: var(--accent); color: white; border: none;
  border-radius: var(--radius); padding: 10px 18px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: background 0.15s;
  flex-shrink: 0;
}
button:hover { background: var(--accent-dim); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.secondary { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
button.secondary:hover { background: var(--border); }

#controls {
  display: flex; gap: 6px; padding: 0 16px 8px; justify-content: flex-end; flex-shrink: 0;
}

/* ── Command Palette ── */
#cmd-palette {
  display: none; position: absolute; bottom: 100%; left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  max-height: 320px; overflow-y: auto; z-index: 100;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
}
#cmd-palette.open { display: block; }

.cmd-group-label {
  padding: 8px 14px 4px; font-size: 11px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
}
.cmd-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  transition: background 0.1s;
}
.cmd-item:hover, .cmd-item.selected { background: rgba(59,130,246,0.15); }
.cmd-item.selected { border-left: 2px solid var(--accent); }
.cmd-name { color: var(--accent); font-family: var(--mono); font-weight: 500; }
.cmd-desc { color: var(--text-dim); font-size: 12px; }
.cmd-shortcut { color: var(--text-dim); font-size: 11px; font-family: var(--mono); }
.cmd-divider { border-top: 1px solid var(--border); margin: 4px 0; }

/* ── Footer / Status Bar ── */
#footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 16px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); flex-shrink: 0;
}
#footer-model { display: flex; align-items: center; gap: 6px; cursor: pointer; }
#footer-model:hover { color: var(--text); }
#footer-thinking { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
#footer-thinking:hover { background: var(--surface); color: var(--text); }
#footer-thinking.active { color: var(--accent); }
#footer-stats { display: flex; gap: 12px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⬡ PiWAB</h1>
    <div id="status"><span id="status-dot"></span><span id="status-text">connecting</span></div>
  </header>
  <div id="messages"></div>
  <div id="queue-indicator"><span id="queue-text">queued: 0</span></div>
  <div id="controls">
    <button class="secondary" id="btn-abort" disabled onclick="abort()">⏹ Abort</button>
    <button class="secondary" id="btn-new" onclick="newSession()">↻ New</button>
    <button class="secondary" id="btn-settings" onclick="openSettings()">⚙ Settings</button>
  </div>
  <div id="input-area" style="position:relative;">
    <div id="cmd-palette"></div>
    <textarea id="input" rows="1" placeholder="Message pi… (Enter sends, auto-steers while streaming)" autofocus></textarea>
    <button id="btn-send" onclick="send()">Send</button>
  </div>
  <div id="footer">
    <div style="display:flex;gap:12px;">
      <div id="footer-model" onclick="openModelSelector()" title="Click to change model">
        <span id="footer-model-icon">🧠</span>
        <span id="footer-model-name">…</span>
      </div>
      <div id="footer-thinking" onclick="cycleThinking()" title="Click to cycle thinking level">
        <span id="footer-thinking-icon">💭</span>
        <span id="footer-thinking-level">off</span>
      </div>
    </div>
    <div id="footer-stats">
      <span id="footer-tokens"></span>
      <span id="footer-context"></span>
    </div>
  </div>
</div>

<script>
// ── State ──
let ws = null;
let isStreaming = false;
let currentAssistantEl = null;
let currentAssistantText = "";
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const btnSend = document.getElementById("btn-send");
const btnAbort = document.getElementById("btn-abort");
const statusDot = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");
const cmdPalette = document.getElementById("cmd-palette");

// ── Footer state ──
let currentModel = null;
let currentThinkingLevel = "off";
let thinkingLevels = ["off", "minimal", "low", "medium", "high"];
let availableModels = [];
let cmdPaletteOpen = false;
let cmdPaletteItems = [];
let cmdPaletteSelectedIdx = -1;

// ── Built-in commands ──
const builtInCommands = [
  { name: "/model", desc: "Select a model", action: openModelSelector, shortcut: "click model" },
  { name: "/thinking", desc: "Cycle thinking level", action: cycleThinking, shortcut: "click thinking" },
  { name: "/compact", desc: "Compact conversation context", action: doCompact },
  { name: "/steer", desc: "Send steering message while agent runs", action: () => { /* handled inline */ } },
  { name: "/followup", desc: "Queue a follow-up message", action: () => { /* handled inline */ } },
  { name: "/fork", desc: "Fork from a previous message", action: doFork },
  { name: "/name", desc: "Set session name", action: doSessionName },
  { name: "/sessions", desc: "List fork points", action: doListForkMessages },
  { name: "/bash", desc: "Run a bash command directly", action: () => { /* handled inline */ } },
  { name: "/settings", desc: "Open settings panel", action: openSettings },
  { name: "/new", desc: "New session", action: newSession, shortcut: "↻" },
  { name: "/export", desc: "Export session to HTML", action: doExport },
  { name: "/stats", desc: "Show session statistics", action: doStats },
];

// ── Connection ──
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    setStatus("connected", "idle");
    // Fetch state and commands on connect
    sendRpc({ type: "get_state" });
    sendRpc({ type: "get_available_models" });
    sendRpc({ type: "get_commands" });
    sendRpc({ type: "get_session_stats" });
  };

  ws.onmessage = (e) => {
    try {
      handleEvent(JSON.parse(e.data));
    } catch (err) {
      console.error("parse error:", err, e.data);
    }
  };

  ws.onclose = () => {
    setStatus("disconnected", "disconnected");
    setTimeout(connect, 2000);
  };

  ws.onerror = () => {};
}

// ── RPC helper ──
function sendRpc(cmd) {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(cmd));
  }
}

// ── Status ──
function setStatus(state, label) {
  statusDot.className = state;
  statusText.textContent = label;
  btnAbort.disabled = state !== "streaming";
  btnSend.textContent = state === "streaming" ? "Steer" : "Send";
}

// ── Send ──
function send() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  // Close command palette if open
  closeCmdPalette();

  // Check if it's a slash command we handle locally
  const cmd = text.split(/\s+/)[0].toLowerCase();
  const localCmd = builtInCommands.find(c => c.name === cmd);
  if (localCmd && localCmd.action && cmd !== "/steer" && cmd !== "/followup") {
    localCmd.action();
    inputEl.value = "";
    autoResize();
    return;
  }

  inputEl.value = "";
  autoResize();

  // Handle /steer and /followup explicitly
  if (cmd === "/steer") {
    const msg = text.slice(6).trim(); // strip "/steer "
    if (msg) {
      sendRpc({ type: "steer", message: msg });
      showNotification(`Steered: ${msg.slice(0, 40)}…`);
    }
    return;
  }
  if (cmd === "/followup") {
    const msg = text.slice(10).trim(); // strip "/followup "
    if (msg) {
      sendRpc({ type: "follow_up", message: msg });
      showNotification(`Follow-up queued: ${msg.slice(0, 40)}…`);
    }
    return;
  }
  if (cmd === "/bash") {
    const bashCmd = text.slice(6).trim(); // strip "/bash "
    if (bashCmd) {
      addSystemMessage("bash", `$ ${bashCmd}`);
      sendRpc({ type: "bash", command: bashCmd });
    }
    return;
  }

  // If agent is streaming, auto-steer instead of prompting
  if (isStreaming) {
    sendRpc({ type: "steer", message: text });
    showNotification(`Steered: ${text.slice(0, 40)}…`);
    return;
  }

  addUserMessage(text);
  sendRpc({ type: "prompt", message: text });
}

function abort() {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "abort" }));
  }
}

function newSession() {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "new_session" }));
    messagesEl.innerHTML = "";
    currentAssistantEl = null;
    currentAssistantText = "";
    closeCmdPalette();
  }
}

// ── Footer actions ──
function openModelSelector() {
  closeCmdPalette();
  if (availableModels.length === 0) {
    // Fetch models if we don't have them yet
    sendRpc({ type: "get_available_models" });
    availableModels = []; // will be populated by response
    // Show loading state
    showNotification("Fetching models…");
    return;
  }
  showModelPalette();
}

function showModelPalette() {
  const items = availableModels.map(m => ({
    name: m.name || m.id,
    desc: m.id,
    detail: m.provider || "",
    action: () => {
      sendRpc({ type: "set_model", provider: m.provider, modelId: m.id });
      closeCmdPalette();
      showNotification(`Switching to ${m.name || m.id}…`);
    },
  }));

  cmdPaletteItems = items;
  cmdPaletteSelectedIdx = items.findIndex(m => m.desc === currentModel?.id) || 0;
  if (cmdPaletteSelectedIdx < 0) cmdPaletteSelectedIdx = 0;

  const html = `<div class="cmd-group-label">Select Model</div>` +
    items.map((m, i) =>
      `<div class="cmd-item${i === cmdPaletteSelectedIdx ? " selected" : ""}" data-idx="${i}">
        <div>
          <span class="cmd-name">${escapeHtml(m.name)}</span>
          ${m.detail ? `<span style="color:var(--text-dim);margin-left:6px;font-size:11px;">${escapeHtml(m.detail)}</span>` : ""}
        </div>
        <span class="cmd-desc">${escapeHtml(m.desc)}</span>
      </div>`
    ).join("");

  cmdPalette.innerHTML = html;
  cmdPalette.classList.add("open");
  cmdPaletteOpen = true;
  inputEl.value = "";
  inputEl.focus();

  cmdPalette.querySelectorAll(".cmd-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      cmdPaletteItems[idx]?.action();
    });
  });
}

function showForkPalette(messages) {
  closeCmdPalette();
  const items = messages.map(m => ({
    name: m.text.length > 60 ? m.text.slice(0, 57) + "…" : m.text,
    desc: m.entryId,
    action: () => {
      sendRpc({ type: "fork", entryId: m.entryId });
      closeCmdPalette();
    },
  }));

  cmdPaletteItems = items;
  cmdPaletteSelectedIdx = 0;

  const html = `<div class="cmd-group-label">Fork from message</div>` +
    items.map((m, i) =>
      `<div class="cmd-item${i === 0 ? " selected" : ""}" data-idx="${i}">
        <span class="cmd-name">${escapeHtml(m.name)}</span>
        <span class="cmd-desc">${escapeHtml(m.desc)}</span>
      </div>`
    ).join("");

  cmdPalette.innerHTML = html;
  cmdPalette.classList.add("open");
  cmdPaletteOpen = true;
  inputEl.value = "";
  inputEl.focus();

  cmdPalette.querySelectorAll(".cmd-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      cmdPaletteItems[idx]?.action();
    });
  });
}

function cycleThinking() {
  closeCmdPalette();
  const idx = thinkingLevels.indexOf(currentThinkingLevel);
  const next = thinkingLevels[(idx + 1) % thinkingLevels.length];
  sendRpc({ type: "set_thinking_level", level: next });
  currentThinkingLevel = next;
  updateFooterThinking();
  showNotification(`Thinking: ${next}`);
}

function doCompact() {
  closeCmdPalette();
  sendRpc({ type: "compact" });
  showNotification("Compacting…");
}

function doExport() {
  closeCmdPalette();
  sendRpc({ type: "export_html" });
  showNotification("Exporting…");
}

function doStats() {
  closeCmdPalette();
  sendRpc({ type: "get_session_stats" });
}

function doFork() {
  closeCmdPalette();
  sendRpc({ type: "get_fork_messages" });
  showNotification("Loading fork points…");
}

function doSessionName() {
  closeCmdPalette();
  const name = prompt("Session name:");
  if (name) {
    sendRpc({ type: "set_session_name", name });
    showNotification(`Session: ${name}`);
  }
}

function doListForkMessages() {
  closeCmdPalette();
  sendRpc({ type: "get_fork_messages" });
}

function openSettings() {
  closeCmdPalette();

  function toggleHtml(id, label, checked) {
    return `<label class="setting-row">
      <span class="setting-label">${escapeHtml(label)}</span>
      <input type="checkbox" id="${id}" ${checked ? "checked" : ""} />
    </label>`;
  }

  function selectHtml(id, label, options, value) {
    const opts = options.map(o => `<option value="${o.value}" ${value === o.value ? "selected" : ""}>${o.label}</option>`).join("");
    return `<label class="setting-row">
      <span class="setting-label">${escapeHtml(label)}</span>
      <select id="${id}" class="setting-select">${opts}</select>
    </label>`;
  }

  const thinkingOptions = [
    { value: "off", label: "Off" },
    { value: "minimal", label: "Minimal" },
    { value: "low", label: "Low" },
    { value: "medium", label: "Medium" },
    { value: "high", label: "High" },
  ];

  const modeOptions = [
    { value: "one-at-a-time", label: "One at a time" },
    { value: "all", label: "All" },
  ];

  const themeOptions = [
    { value: "dark", label: "Dark" },
    { value: "light", label: "Light" },
  ];

  const overlay = showModal(`
    <h3>⚙ Settings</h3>
    <div class="settings-list">
      ${selectHtml("setting-thinking-level", "Thinking level", thinkingOptions, currentThinkingLevel || settings.thinkingLevel)}
      ${selectHtml("setting-steer-mode", "Steering mode", modeOptions, settings.steeringMode)}
      ${selectHtml("setting-followup-mode", "Follow-up mode", modeOptions, settings.followUpMode)}
      ${toggleHtml("setting-auto-compact", "Auto-compact", settings.autoCompaction)}
      ${toggleHtml("setting-hide-thinking", "Hide thinking", settings.hideThinking)}
      ${toggleHtml("setting-collapse-changelog", "Collapse changelog", settings.collapseChangelog)}
      ${toggleHtml("setting-quiet-startup", "Quiet startup", settings.quietStartup)}
      ${selectHtml("setting-theme", "Theme", themeOptions, settings.theme)}
    </div>
    <div class="modal-actions">
      <button class="cancel" data-cancel="true">Cancel</button>
      <button data-confirm="true">Save</button>
    </div>
  `, () => {});

  overlay.querySelector("[data-cancel]").onclick = () => { closeModal(); };
  overlay.querySelector("[data-confirm]").onclick = () => {
    const thinkingLevel = document.getElementById("setting-thinking-level").value;
    const steerMode = document.getElementById("setting-steer-mode").value;
    const followupMode = document.getElementById("setting-followup-mode").value;

    settings.autoCompaction = document.getElementById("setting-auto-compact").checked;
    settings.steeringMode = steerMode;
    settings.followUpMode = followupMode;
    settings.thinkingLevel = thinkingLevel;
    settings.hideThinking = document.getElementById("setting-hide-thinking").checked;
    settings.collapseChangelog = document.getElementById("setting-collapse-changelog").checked;
    settings.quietStartup = document.getElementById("setting-quiet-startup").checked;
    settings.theme = document.getElementById("setting-theme").value;

    // Send RPC commands
    sendRpc({ type: "set_auto_compaction", enabled: settings.autoCompaction });
    sendRpc({ type: "set_steering_mode", mode: steerMode });
    sendRpc({ type: "set_follow_up_mode", mode: followupMode });
    if (thinkingLevel !== currentThinkingLevel) {
      sendRpc({ type: "set_thinking_level", level: thinkingLevel });
      currentThinkingLevel = thinkingLevel;
      updateFooterThinking();
    }

    saveSettings();
    closeModal();
    showNotification("Settings saved");
  };
}

// ── Notification ──
function showNotification(msg, duration = 2500) {
  let notif = document.getElementById("notification");
  if (!notif) {
    notif = document.createElement("div");
    notif.id = "notification";
    notif.style.cssText = `
      position:fixed;top:16px;right:16px;background:var(--surface);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:8px 16px;font-size:13px;color:var(--text);z-index:999;
      opacity:0;transition:opacity 0.2s;pointer-events:none;
    `;
    document.body.appendChild(notif);
  }
  notif.textContent = msg;
  notif.style.opacity = "1";
  clearTimeout(notif._timer);
  notif._timer = setTimeout(() => { notif.style.opacity = "0"; }, duration);
}

// ── Command Palette ──
function showCmdPalette(filter = "") {
  const filterLower = filter.toLowerCase();

  // Combine built-in + extension/prompt/skill commands
  const allCmds = [
    ...builtInCommands,
    ...extensionCommands.map(c => ({
      name: `/${c.name}`,
      desc: c.description || "",
      action: () => {
        sendRpc({ type: "prompt", message: `/${c.name}` });
        closeCmdPalette();
        inputEl.value = "";
        autoResize();
      },
    })),
  ];

  const filtered = filterLower
    ? allCmds.filter(c => c.name.includes(filterLower) || c.desc.toLowerCase().includes(filterLower))
    : allCmds;

  if (filtered.length === 0) {
    cmdPalette.classList.remove("open");
    cmdPaletteOpen = false;
    return;
  }

  cmdPaletteItems = filtered;
  cmdPaletteSelectedIdx = 0;

  // Group: built-in vs extension commands
  const builtIn = filtered.filter(c => builtInCommands.includes(c));
  const ext = filtered.filter(c => !builtInCommands.includes(c));

  let html = "";
  if (builtIn.length > 0) {
    html += `<div class="cmd-group-label">Commands</div>`;
    html += builtIn.map((c, i) => {
      const globalIdx = filtered.indexOf(c);
      return `<div class="cmd-item${globalIdx === cmdPaletteSelectedIdx ? " selected" : ""}" data-idx="${globalIdx}">
        <span class="cmd-name">${escapeHtml(c.name)}</span>
        <span class="cmd-desc">${escapeHtml(c.desc)}</span>
      </div>`;
    }).join("");
  }
  if (ext.length > 0) {
    if (builtIn.length > 0) html += `<div class="cmd-divider"></div>`;
    html += `<div class="cmd-group-label">Extensions & Templates</div>`;
    html += ext.map((c, i) => {
      const globalIdx = filtered.indexOf(c);
      return `<div class="cmd-item${globalIdx === cmdPaletteSelectedIdx ? " selected" : ""}" data-idx="${globalIdx}">
        <span class="cmd-name">${escapeHtml(c.name)}</span>
        <span class="cmd-desc">${escapeHtml(c.desc)}</span>
      </div>`;
    }).join("");
  }

  cmdPalette.innerHTML = html;
  cmdPalette.classList.add("open");
  cmdPaletteOpen = true;

  // Wire click handlers
  cmdPalette.querySelectorAll(".cmd-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      cmdPaletteItems[idx]?.action();
    });
  });
}

function closeCmdPalette() {
  cmdPalette.classList.remove("open");
  cmdPaletteOpen = false;
  cmdPaletteItems = [];
  cmdPaletteSelectedIdx = -1;
}

function updateCmdPaletteSelection() {
  cmdPalette.querySelectorAll(".cmd-item").forEach((el, i) => {
    el.classList.toggle("selected", i === cmdPaletteSelectedIdx);
  });
  // Scroll selected into view
  const selected = cmdPalette.querySelector(".cmd-item.selected");
  if (selected) selected.scrollIntoView({ block: "nearest" });
}

function updateFooterModel() {
  const nameEl = document.getElementById("footer-model-name");
  nameEl.textContent = currentModel ? (currentModel.name || currentModel.id) : "…";
}

function updateFooterThinking() {
  const levelEl = document.getElementById("footer-thinking-level");
  const iconEl = document.getElementById("footer-thinking-icon");
  const footerThinking = document.getElementById("footer-thinking");
  levelEl.textContent = currentThinkingLevel;
  footerThinking.classList.toggle("active", currentThinkingLevel !== "off");
  iconEl.textContent = currentThinkingLevel === "off" ? "💭" : "🧠";
}

function updateFooterStats(data) {
  const tokensEl = document.getElementById("footer-tokens");
  const contextEl = document.getElementById("footer-context");
  if (data?.tokens) {
    const t = data.tokens;
    tokensEl.textContent = `${formatTokens(t.input)}in / ${formatTokens(t.output)}out`;
  }
  if (data?.contextUsage) {
    const pct = data.contextUsage.percent;
    contextEl.textContent = `ctx: ${pct !== null ? pct + "%" : "–"}`;
  }
}

function formatTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return n?.toString() || "0";
}

// ── Input handling ──
inputEl.addEventListener("keydown", (e) => {
  // Command palette navigation
  if (cmdPaletteOpen) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      cmdPaletteSelectedIdx = Math.min(cmdPaletteSelectedIdx + 1, cmdPaletteItems.length - 1);
      updateCmdPaletteSelection();
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      cmdPaletteSelectedIdx = Math.max(cmdPaletteSelectedIdx - 1, 0);
      updateCmdPaletteSelection();
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      if (cmdPaletteItems[cmdPaletteSelectedIdx]) {
        cmdPaletteItems[cmdPaletteSelectedIdx].action();
      }
      return;
    }
    if (e.key === "Escape") {
      e.preventDefault();
      closeCmdPalette();
      return;
    }
    // Let other keys pass through to update the filter
    return;
  }

  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

inputEl.addEventListener("input", () => {
  autoResize();

  // Command palette: triggered by / at start of input
  const val = inputEl.value;
  if (val.startsWith("/")) {
    const filter = val.slice(1);
    // Check if it looks like a direct command (no spaces yet, or after space it's args)
    if (!filter.includes(" ") || filter.endsWith(" ")) {
      showCmdPalette(filter.split(" ")[0]);
    } else {
      // They're typing arguments after a command, close palette
      closeCmdPalette();
    }
  } else {
    closeCmdPalette();
  }
});

// Close palette on click outside
document.addEventListener("click", (e) => {
  if (cmdPaletteOpen && !cmdPalette.contains(e.target) && e.target !== inputEl) {
    closeCmdPalette();
  }
});

function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
}

// ── Message rendering ──
function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `<div class="msg-user">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function startAssistantMessage() {
  const div = document.createElement("div");
  div.className = "msg assistant";
  const bubble = document.createElement("div");
  bubble.className = "msg-assistant";
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  currentAssistantEl = bubble;
  currentAssistantText = "";
  return bubble;
}

function appendAssistantText(delta) {
  if (!currentAssistantEl) startAssistantMessage();
  currentAssistantText += delta;
  currentAssistantEl.innerHTML = renderMarkdown(currentAssistantText);
  scrollToBottom();
}

function endAssistantMessage() {
  currentAssistantEl = null;
  currentAssistantText = "";
}

function addToolCard(id, name, args) {
  const div = document.createElement("div");
  div.className = "msg tool";
  div.id = `tool-${id}`;

  const card = document.createElement("div");
  card.className = "tool-card";

  const header = document.createElement("div");
  header.className = "tool-header";
  header.innerHTML = `
    <span class="tool-name">${escapeHtml(name)}</span>
    <span style="display:flex;align-items:center;gap:8px;">
      <span class="tool-status running" id="tool-status-${id}">running…</span>
      <span class="tool-toggle" id="tool-toggle-${id}">▶</span>
    </span>`;

  const argsEl = document.createElement("div");
  argsEl.className = "tool-args";
  argsEl.textContent = formatArgs(name, args);

  const body = document.createElement("div");
  body.className = "tool-body";
  body.id = `tool-body-${id}`;

  header.onclick = () => {
    body.classList.toggle("open");
    document.getElementById(`tool-toggle-${id}`)?.classList.toggle("open");
  };

  card.appendChild(header);
  card.appendChild(argsEl);
  card.appendChild(body);
  div.appendChild(card);
  messagesEl.appendChild(div);
  scrollToBottom();
}

function updateToolCard(id, partial) {
  const body = document.getElementById(`tool-body-${id}`);
  if (!body) return;
  const text = partial?.content?.map(c => c.text || "").join("") || "";
  body.textContent = text;
  // Don't auto-expand — keep collapsed unless user opens it
  scrollToBottom();
}

function endToolCard(id, isError) {
  const status = document.getElementById(`tool-status-${id}`);
  if (status) {
    status.textContent = isError ? "error" : "done";
    status.className = "tool-status" + (isError ? " error" : "");
  }
}

function addErrorMessage(text) {
  const div = document.createElement("div");
  div.className = "msg error";
  div.innerHTML = `<div class="msg-error-text">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollToBottom();
}

// ── System message ──
function addSystemMessage(label, text) {
  const div = document.createElement("div");
  div.className = "msg-system";
  div.innerHTML = `<span class="label">${escapeHtml(label)}</span>${escapeHtml(text)}`;
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

// ── Thinking ──
let currentThinkingEl = null;
let currentThinkingText = "";

function startThinking() {
  if (!currentAssistantEl) startAssistantMessage();
  const thinkDiv = document.createElement("div");
  thinkDiv.className = "msg-thinking";
  thinkDiv.innerHTML = `<span>💭 thinking…</span><div class="thinking-content"></div>`;
  thinkDiv.onclick = () => thinkDiv.querySelector(".thinking-content")?.classList.toggle("open");
  currentAssistantEl.parentElement.insertBefore(thinkDiv, currentAssistantEl);
  currentThinkingEl = thinkDiv.querySelector(".thinking-content");
  currentThinkingText = "";
}

function appendThinking(delta) {
  if (!currentThinkingEl) return;
  currentThinkingText += delta;
  currentThinkingEl.textContent = currentThinkingText;
}

function endThinking() {
  currentThinkingEl = null;
  currentThinkingText = "";
}

// ── Extension commands storage ──
let extensionCommands = [];

// ── Settings state ──
let settings = loadSettings();

function defaultSettings() {
  return {
    // Server-side (RPC)
    autoCompaction: true,
    steeringMode: "one-at-a-time",
    followUpMode: "one-at-a-time",
    thinkingLevel: "low",
    // Local (localStorage)
    hideThinking: false,
    collapseChangelog: false,
    quietStartup: false,
    theme: "dark",
  };
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem("piwab-settings"));
    return { ...defaultSettings(), ...saved };
  } catch { return defaultSettings(); }
}

function saveSettings() {
  localStorage.setItem("piwab-settings", JSON.stringify(settings));
}

// ── Event handler ──
function handleEvent(event) {
  switch (event.type) {

    case "response":
      // Handle RPC responses
      handleResponse(event);
      break;

    case "agent_start":
      isStreaming = true;
      setStatus("streaming", "thinking…");
      break;

    case "agent_end":
      isStreaming = false;
      setStatus("connected", "idle");
      endAssistantMessage();
      endThinking();
      document.getElementById("queue-indicator").classList.remove("visible");
      // Refresh stats after agent finishes
      sendRpc({ type: "get_session_stats" });
      break;

    case "message_start":
      if (event.message?.role === "assistant") {
        currentAssistantEl = null;
        currentAssistantText = "";
      }
      break;

    case "message_update": {
      const ae = event.assistantMessageEvent;
      if (!ae) break;
      switch (ae.type) {
        case "thinking_start":
          startThinking();
          break;
        case "thinking_delta":
          appendThinking(ae.delta || "");
          break;
        case "thinking_end":
          endThinking();
          break;
        case "text_delta":
          appendAssistantText(ae.delta || "");
          break;
        case "toolcall_start":
          setStatus("streaming", `${ae.toolCall?.name || "tool"}…`);
          break;
      }
      break;
    }

    case "message_end":
      break;

    case "tool_execution_start":
      addToolCard(
        event.toolCallId || "unknown",
        event.toolName || "unknown",
        event.args,
      );
      break;

    case "tool_execution_update":
      updateToolCard(event.toolCallId || "unknown", event.partialResult);
      break;

    case "tool_execution_end":
      endToolCard(event.toolCallId || "unknown", event.isError);
      if (event.isError && event.result) {
        const errText = event.result.content?.map(c => c.text || "").join("") || "Tool error";
        const body = document.getElementById(`tool-body-${event.toolCallId}`);
        if (body) body.textContent = errText;
      }
      break;

    case "extension_ui_request":
      handleExtensionUiRequest(event);
      break;

    case "extension_error":
      console.error("[extension error]", event.extensionPath, event.error);
      break;

    // ── Turn events ──
    case "turn_start":
      // turn started — no UI action needed
      break;

    case "turn_end":
      // turn ended — message and toolResults available if needed
      break;

    // ── Queue events ──
    case "queue_update": {
      const steer = event.steering || [];
      const follow = event.followUp || [];
      const total = steer.length + follow.length;
      const qi = document.getElementById("queue-indicator");
      const qt = document.getElementById("queue-text");
      if (total > 0) {
        const parts = [];
        if (steer.length) parts.push(`${steer.length} steer`);
        if (follow.length) parts.push(`${follow.length} follow-up`);
        qt.textContent = parts.join(" + ");
        qi.classList.add("visible");
      } else {
        qi.classList.remove("visible");
      }
      break;
    }

    // ── Compaction events ──
    case "compaction_start":
      addSystemMessage("compacting", `${event.reason || "manual"}…`);
      break;

    case "compaction_end": {
      const qi2 = document.getElementById("queue-indicator");
      // remove the compacting system message (last one)
      const sysMsgs = messagesEl.querySelectorAll(".msg-system");
      const last = sysMsgs[sysMsgs.length - 1];
      if (last?.textContent?.includes("compacting")) last.remove();
      if (event.aborted) {
        showNotification("Compaction aborted");
      } else if (event.result) {
        showNotification(`Compacted: ${formatTokens(event.result.tokensBefore)} → saved`);
      }
      sendRpc({ type: "get_session_stats" });
      break;
    }

    // ── Auto-retry events ──
    case "auto_retry_start":
      addSystemMessage("retry", `attempt ${event.attempt}/${event.maxAttempts} in ${(event.delayMs / 1000).toFixed(0)}s`);
      break;

    case "auto_retry_end":
      // remove retry system message
      const sysMsgs2 = messagesEl.querySelectorAll(".msg-system");
      const lastRetry = sysMsgs2[sysMsgs2.length - 1];
      if (lastRetry?.textContent?.includes("retry")) lastRetry.remove();
      if (!event.success) {
        addErrorMessage(`Retry failed after ${event.attempt} attempts: ${event.finalError || "unknown error"}`);
      }
      break;
  }
}

function handleResponse(event) {
  if (!event.success) {
    if (event.error) {
      showNotification(`Error: ${event.error}`, 4000);
    }
    return;
  }

  const cmd = event.command;
  const data = event.data;

  switch (cmd) {
    case "get_state":
      if (data?.model) {
        currentModel = data.model;
        updateFooterModel();
      }
      if (data?.thinkingLevel) {
        currentThinkingLevel = data.thinkingLevel;
        updateFooterThinking();
      }
      if (data?.autoCompactionEnabled !== undefined) settings.autoCompaction = data.autoCompactionEnabled;
      if (data?.steeringMode) settings.steeringMode = data.steeringMode;
      if (data?.followUpMode) settings.followUpMode = data.followUpMode;
      break;

    case "get_available_models":
      if (data?.models) {
        availableModels = data.models;
      }
      break;

    case "set_model":
      if (data) {
        currentModel = data;
        updateFooterModel();
        showNotification(`Model: ${data.name || data.id}`);
      }
      break;

    case "cycle_model":
      if (data?.model) {
        currentModel = data.model;
        updateFooterModel();
        showNotification(`Model: ${data.model.name || data.model.id}`);
      }
      break;

    case "set_thinking_level":
      updateFooterThinking();
      break;

    case "cycle_thinking_level":
      if (data?.level) {
        currentThinkingLevel = data.level;
        updateFooterThinking();
        showNotification(`Thinking: ${data.level}`);
      }
      break;

    case "get_commands":
      if (data?.commands) {
        extensionCommands = data.commands;
      }
      break;

    case "get_session_stats":
      updateFooterStats(data);
      break;

    case "compact":
      if (data?.summary) {
        showNotification(`Compacted: ${data.summary.slice(0, 60)}…`);
      } else {
        showNotification("Compacted.");
      }
      sendRpc({ type: "get_session_stats" });
      break;

    case "export_html":
      if (data?.path) {
        showNotification(`Exported to ${data.path}`);
      }
      break;

    case "steer":
      if (event.success) {
        // steer accepted — queue_update will show it
      } else {
        showNotification(`Steer failed: ${event.error || "unknown"}`, 4000);
      }
      break;

    case "follow_up":
      if (event.success) {
        // follow-up queued
      } else {
        showNotification(`Follow-up failed: ${event.error || "unknown"}`, 4000);
      }
      break;

    case "set_session_name":
      if (event.success) showNotification("Session renamed");
      break;

    case "switch_session":
      if (data?.cancelled) {
        showNotification("Session switch cancelled by extension");
      } else {
        showNotification("Switched session");
        messagesEl.innerHTML = "";
        sendRpc({ type: "get_state" });
      }
      break;

    case "new_session":
      if (data?.cancelled) {
        showNotification("New session cancelled by extension");
      }
      break;

    case "fork":
      if (data?.cancelled) {
        showNotification("Fork cancelled by extension");
      } else if (data?.text) {
        showNotification(`Forked from: ${data.text.slice(0, 50)}…`);
        messagesEl.innerHTML = "";
        sendRpc({ type: "get_state" });
      }
      break;

    case "get_fork_messages":
      if (data?.messages?.length) {
        showForkPalette(data.messages);
      } else {
        showNotification("No fork points available");
      }
      break;

    case "bash":
      if (event.success && data) {
        // Show output in a system message or tool card
        const output = data.output || "";
        const exitCode = data.exitCode;
        const truncated = data.truncated;
        let outputText = output.length > 500 ? output.slice(0, 500) + "…" : output;
        if (truncated) outputText += "\n(truncated — full output at " + data.fullOutputPath + ")";
        addSystemMessage("bash", `exit ${exitCode}\n${outputText}`);
      } else if (!event.success) {
        addErrorMessage(`bash failed: ${event.error || "unknown"}`);
      }
      break;
  }
}

// ── Extension UI Dialogs ──
function showModal(html, onResponse) {
  // Remove any existing modal
  document.querySelector(".modal-overlay")?.remove();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
  // Close on backdrop click
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) onResponse({ cancelled: true });
  });
  // Close on Escape
  const escHandler = (e) => {
    if (e.key === "Escape") { document.removeEventListener("keydown", escHandler); onResponse({ cancelled: true }); }
  };
  document.addEventListener("keydown", escHandler);
  return overlay;
}

function closeModal() {
  document.querySelector(".modal-overlay")?.remove();
}

function handleExtensionUiRequest(event) {
  const { id, method } = event;

  switch (method) {
    case "select": {
      const options = event.options || [];
      const opts = options.map((o, i) => `<option value="${i}">${escapeHtml(typeof o === 'string' ? o : o.label || o)}</option>`).join("");
      const html = `
        <h3>${escapeHtml(event.title || "Select")}</h3>
        ${event.timeout ? `<p>Timeout: ${(event.timeout / 1000).toFixed(0)}s</p>` : ""}
        <select id="modal-select">${opts}</select>
        <div class="modal-actions">
          <button class="cancel" onclick="closeModal();sendUiResponse('${id}',null,true)">Cancel</button>
          <button onclick="const v=document.getElementById('modal-select').value;closeModal();sendUiResponse('${id}',options[${id}='${id}',${options}][v],false)">OK</button>
        </div>`;
      // Simplified: use data attributes
      const overlay = showModal(`
        <h3>${escapeHtml(event.title || "Select")}</h3>
        ${event.timeout ? `<p>Timeout: ${(event.timeout / 1000).toFixed(0)}s</p>` : ""}
        <select id="modal-value">${opts}</select>
        <div class="modal-actions">
          <button class="cancel" data-cancel="true">Cancel</button>
          <button data-confirm="true">OK</button>
        </div>`, (result) => {
        if (result.cancelled) {
          sendUiResponse(id, null, true);
        }
      });
      overlay.querySelector("[data-cancel]").onclick = () => { closeModal(); sendUiResponse(id, null, true); };
      overlay.querySelector("[data-confirm]").onclick = () => {
        const idx = parseInt(document.getElementById("modal-value").value);
        closeModal(); sendUiResponse(id, options[idx], false);
      };
      break;
    }

    case "confirm": {
      const overlay = showModal(`
        <h3>${escapeHtml(event.title || "Confirm")}</h3>
        ${event.message ? `<p>${escapeHtml(event.message)}</p>` : ""}
        <div class="modal-actions">
          <button class="cancel" data-cancel="true">No</button>
          <button data-confirm="true">Yes</button>
        </div>`, (result) => {
        if (result.cancelled) sendUiResponse(id, null, true);
      });
      overlay.querySelector("[data-cancel]").onclick = () => { closeModal(); sendUiResponse(id, null, true, false); };
      overlay.querySelector("[data-confirm]").onclick = () => { closeModal(); sendUiResponse(id, null, true, true); };
      break;
    }

    case "input": {
      const overlay = showModal(`
        <h3>${escapeHtml(event.title || "Input")}</h3>
        <input type="text" id="modal-value" placeholder="${escapeHtml(event.placeholder || "")}" />
        <div class="modal-actions">
          <button class="cancel" data-cancel="true">Cancel</button>
          <button data-confirm="true">OK</button>
        </div>`, (result) => {
        if (result.cancelled) sendUiResponse(id, null, true);
      });
      const inp = overlay.querySelector("#modal-value");
      inp.focus();
      inp.addEventListener("keydown", (e) => { if (e.key === "Enter") { overlay.querySelector("[data-confirm]").click(); } });
      overlay.querySelector("[data-cancel]").onclick = () => { closeModal(); sendUiResponse(id, null, true); };
      overlay.querySelector("[data-confirm]").onclick = () => {
        closeModal(); sendUiResponse(id, document.getElementById("modal-value").value, false);
      };
      break;
    }

    case "editor": {
      const overlay = showModal(`
        <h3>${escapeHtml(event.title || "Edit")}</h3>
        <textarea id="modal-value">${escapeHtml(event.prefill || "")}</textarea>
        <div class="modal-actions">
          <button class="cancel" data-cancel="true">Cancel</button>
          <button data-confirm="true">OK</button>
        </div>`, (result) => {
        if (result.cancelled) sendUiResponse(id, null, true);
      });
      overlay.querySelector("#modal-value").focus();
      overlay.querySelector("[data-cancel]").onclick = () => { closeModal(); sendUiResponse(id, null, true); };
      overlay.querySelector("[data-confirm]").onclick = () => {
        closeModal(); sendUiResponse(id, document.getElementById("modal-value").value, false);
      };
      break;
    }

    case "notify":
      showNotification(event.message || "", event.notifyType === "error" ? 5000 : 3000);
      break;

    case "setStatus":
      // Could update a status bar entry — for now just log
      console.log(`[ext status] ${event.statusKey}: ${event.statusText}`);
      break;

    case "setTitle":
      if (event.title) document.title = event.title;
      break;

    case "set_editor_text":
      if (event.text) { inputEl.value = event.text; autoResize(); }
      break;

    case "setWidget":
      // Widgets not supported in web UI — ignore gracefully
      break;

    default:
      console.log(`[ext ui] unhandled method: ${method}`, event);
  }
}

function sendUiResponse(id, value, cancelled, confirmed) {
  const response = { type: "extension_ui_response", id };
  if (cancelled) {
    response.cancelled = true;
  } else if (confirmed !== undefined) {
    response.confirmed = confirmed;
  } else {
    response.value = value;
  }
  sendRpc(response);
}

// ── Utilities ──
function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function formatArgs(toolName, args) {
  if (!args) return "";
  if (toolName === "bash") return `$ ${args.command || ""}`;
  return JSON.stringify(args, null, 2);
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function renderMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  html = html.replace(/\n/g, "<br>");
  return html;
}

// ── Boot ──
connect();
inputEl.focus();
</script>
